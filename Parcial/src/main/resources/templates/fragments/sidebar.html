<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="html_head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Salvador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div th:fragment="nav_sidebar(activePage)" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-200 flex flex-col justify-between z-40">
    <div class="p-6">
        <div class="flex items-center space-x-3 text-[#0a3a82]">
            <i data-lucide="cross" class="w-8 h-8 fill-current text-blue-600"></i>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-[#0a3a82]">Clínica Salvador</h1>
                <p class="text-xs text-gray-500 font-medium">Panel de Recepción</p>
            </div>
        </div>

        <nav class="mt-8 space-y-1">
            <a th:href="@{/medicos}"
               th:class="${activePage == 'medicos'}
                         ? 'flex items-center space-x-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium transition-all'
                         : 'flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-all'">
                <i data-lucide="user-cog" class="w-5 h-5"></i>
                <span>Médicos</span>
            </a>

            <a th:href="@{/pacientes}"
               th:class="${activePage == 'pacientes'}
                         ? 'flex items-center space-x-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium transition-all'
                         : 'flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-all'">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span>Pacientes</span>
            </a>

            <a th:href="@{/citas}"
               th:class="${activePage == 'citas'}
                         ? 'flex items-center space-x-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium transition-all'
                         : 'flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-all'">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span>Citas</span>
            </a>
        </nav>
    </div>

    <div class="p-4 border-t border-gray-100">
        <button id="btnNuevoRegistroGlobal" class="w-full bg-[#004bb4] text-white flex items-center justify-center space-x-2 py-2.5 rounded-lg text-sm font-semibold hover:bg-blue-800 transition-all shadow-md shadow-blue-200 mb-4">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span>Nuevo Registro</span>
        </button>

        <a href="#" class="flex items-center space-x-3 px-4 py-2.5 text-sm text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-lg transition-all">
            <i data-lucide="settings" class="w-4 h-4"></i>
            <span>Ajustes</span>
        </a>
        <a href="#" class="flex items-center space-x-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-all font-medium">
            <i data-lucide="log-out" class="w-4 h-4"></i>
            <span>Cerrar Sesión</span>
        </a>
    </div>
</div>

<div th:fragment="lucide_init">
    <script>
        lucide.createIcons();
    </script>
</div>

</body>
</html>
